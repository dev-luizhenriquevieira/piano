<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piano Simulator</title>

  <!-- styles -->
  <link rel="stylesheet" href="./styles/reset.css">
  <link rel="stylesheet" href="./styles/main.css">

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,400;0,700;1,100;1,200;1,300;1,400&display=swap"
    rel="stylesheet">
</head>

<body>
  <div class="container">
    <header>
      <h2>Virtual Piano</h2>
      <div class="column volume-slider">
        <span>Volume</span> <input type="range" min="0" max="1" value="0.5" step="any">
      </div>
      <div class="column keys-check">
        <span>Teclas</span> <input type="checkbox" checked>
      </div>
      <div class="column delay-check">
        <span>Delay</span> <input type="checkbox">
      </div>
    </header>
    <ul class="piano-keys">
      <li class="key white" data-key="a" data-tune="a"><span>a</span></li>
      <li class="key black" data-key="w" data-tune="w"><span>w</span></li>
      <li class="key white" data-key="s" data-tune="s"><span>s</span></li>
      <li class="key black" data-key="e" data-tune="e"><span>e</span></li>
      <li class="key white" data-key="d" data-tune="d"><span>d</span></li>
      <li class="key white" data-key="t" data-tune="f"><span>t</span></li>
      <li class="key black" data-key="g" data-tune="t"><span>g</span></li>
      <li class="key white" data-key="y" data-tune="g"><span>y</span></li>
      <li class="key black" data-key="h" data-tune="y"><span>h</span></li>
      <li class="key white" data-key="u" data-tune="h"><span>u</span></li>
      <li class="key black" data-key="j" data-tune="u"><span>j</span></li>
      <li class="key white" data-key="k" data-tune="j"><span>k</span></li>
      <li class="key white" data-key="l" data-tune="k"><span>l</span></li>
      <li class="key black" data-key="p" data-tune="o"><span>p</span></li>
      <li class="key white" data-key=";" data-tune="l"><span>;</span></li>
    </ul>
  </div>

  <script src="./scripts/engine.js" defer></script>
</body>

</html>
